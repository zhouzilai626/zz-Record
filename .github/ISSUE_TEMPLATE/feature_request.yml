name: 功能建议
description: 提出能改善录制、编辑或导出工作流的具体需求
title: "[建议] "
labels: ["enhancement", "triage"]
body:
  - type: checkboxes
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，未找到相同建议。
          required: true

  - type: textarea
    id: scenario
    attributes:
      label: 使用场景与当前问题
      description: 先说明你想完成什么，以及现有流程卡在哪里。
      placeholder: 例如，我录制产品教程时，需要在多段视频之间快速复用同一套摄像头样式。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 希望如何改进
      description: 描述预期行为，不需要提供技术方案。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已尝试的方法或替代方案

  - type: textarea
    id: context
    attributes:
      label: 截图、示例或补充信息

