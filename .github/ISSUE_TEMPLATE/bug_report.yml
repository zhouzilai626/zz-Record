name: 问题反馈
description: 报告 ZZ Record 的录制、声音、编辑、导出或手机摄像头问题
title: "[问题] "
labels: ["bug", "triage"]
body:
  - type: checkboxes
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，未找到相同问题。
          required: true
        - label: 我不会在此公开 Issue 中附上证书、录制文件、凭据或可利用的安全细节。
          required: true

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 请说明发生了什么，以及它影响了哪一步操作。
      placeholder: 例如，停止录制后编辑器预览为黑屏。
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开...
        2. 选择...
        3. 开始录制...
        4. 看到...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 问题位置
      options:
        - 录制屏幕或窗口
        - 麦克风或系统声音
        - 本地摄像头
        - 手机摄像头配对或预览
        - 编辑器或时间线
        - 导出 MP4 或 GIF
        - 安装、启动或更新
        - 其他
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: ZZ Record 版本
      placeholder: 例如 1.4.3
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows 版本
      placeholder: 例如 Windows 11 24H2
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 截图、日志或补充信息
      description: 可以拖入截图。请先移除个人信息和敏感内容。

